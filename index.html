<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GamePass - Kho Game Bản Quyền</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel CDN (Để chạy JSX trực tiếp trên trình duyệt) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-[#F8FAFC]">
    <div id="root"></div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>

    <script type="text/babel">
        // Cấu hình Firebase - Chú ý: Cần điền thông tin thật từ Firebase Console
        const firebaseConfig = window.__firebase_config ? JSON.parse(window.__firebase_config) : {
            apiKey: "",
            authDomain: "",
            projectId: "",
            storageBucket: "",
            messagingSenderId: "",
            appId: ""
        };
        const appId = window.__app_id || 'game-portal-v2';

        // Khởi tạo Firebase (Phiên bản Compat)
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const { useState, useEffect, useMemo } = React;

        const CATEGORIES = ["Tất cả", "Hành động", "Nhập vai", "Chiến thuật", "Phiêu lưu", "Thể thao", "Kinh dị"];

        const formatTime = (timestamp) => {
            if (!timestamp) return 'Vừa xong';
            const date = timestamp.seconds ? timestamp.toDate() : new Date(timestamp);
            const diff = Math.floor((new Date() - date) / 1000);
            if (diff < 60) return 'Vừa xong';
            if (diff < 3600) return `${Math.floor(diff / 60)} phút trước`;
            if (diff < 86400) return `${Math.floor(diff / 3600)} giờ trước`;
            return date.toLocaleDateString('vi-VN');
        };

        const Badge = ({ children, variant = "primary" }) => {
            const styles = {
                primary: "bg-indigo-600 text-white",
                secondary: "bg-slate-100 text-slate-600",
                hot: "bg-orange-500 text-white shadow-sm",
                category: "bg-indigo-50 text-indigo-600 border border-indigo-100"
            };
            return (
                <span className={`${styles[variant]} text-[10px] font-bold px-2.5 py-1 rounded-lg uppercase tracking-wider`}>
                    {children}
                </span>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [games, setGames] = useState([]);
            const [requests, setRequests] = useState([]);
            const [view, setView] = useState("user"); 
            const [loading, setLoading] = useState(true);
            const [searchTerm, setSearchTerm] = useState("");
            const [activeCategory, setActiveCategory] = useState("Tất cả");
            const [selectedGame, setSelectedGame] = useState(null);
            const [modals, setModals] = useState({ login: false, request: false });
            const [adminTab, setAdminTab] = useState("dashboard");
            const [editingGame, setEditingGame] = useState(null);

            // Bước 1: Xử lý Authentication trước (Rule 3)
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (window.__initial_auth_token) {
                            await auth.signInWithCustomToken(window.__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }
                    } catch (err) { 
                        console.error("Auth Fail:", err); 
                    }
                };
                initAuth();
                
                const unsubscribe = auth.onAuthStateChanged((usr) => {
                    setUser(usr);
                });
                
                return () => unsubscribe();
            }, []);

            // Bước 2: Chỉ tải dữ liệu khi đã có User (Rule 3 Guard)
            useEffect(() => {
                if (!user) return;

                const gamesRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('games');
                const requestsRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('requests');

                // Lắng nghe game real-time (Rule 1: Đường dẫn nghiêm ngặt)
                const unsubGames = gamesRef.onSnapshot((snap) => {
                    const data = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    // Sắp xếp thủ công (Rule 2: Không query phức tạp)
                    setGames(data.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0)));
                    setLoading(false);
                }, (err) => {
                    console.error("Games snapshot error:", err);
                });

                // Lắng nghe yêu cầu real-time
                const unsubReqs = requestsRef.onSnapshot((snap) => {
                    const data = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setRequests(data.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0)));
                }, (err) => {
                    console.error("Requests snapshot error:", err);
                });

                return () => { 
                    unsubGames(); 
                    unsubReqs(); 
                };
            }, [user]);

            // Cập nhật Icons sau khi render
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            });

            const handleGameSubmit = async (e) => {
                e.preventDefault();
                if (!user) return;
                const fd = new FormData(e.target);
                const data = Object.fromEntries(fd);
                setLoading(true);

                try {
                    const colRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('games');
                    if (editingGame) {
                        await colRef.doc(editingGame.id).update({ 
                            ...data, 
                            updatedAt: firebase.firestore.FieldValue.serverTimestamp() 
                        });
                    } else {
                        await colRef.add({ 
                            ...data, 
                            views: 0, 
                            downloads: 0, 
                            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                        });
                    }
                    setAdminTab("manage");
                    setEditingGame(null);
                } catch (err) { 
                    console.error("Submit Error:", err); 
                }
                setLoading(false);
            };

            const trackInteraction = async (id, type) => {
                if (!user) return;
                try {
                    const docRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('games').doc(id);
                    await docRef.update({ [type]: firebase.firestore.FieldValue.increment(1) });
                } catch (err) {
                    console.error("Interaction Error:", err);
                }
            };

            const filteredGames = useMemo(() => {
                return games.filter(g => {
                    const matchesSearch = (g.title || "").toLowerCase().includes(searchTerm.toLowerCase());
                    const matchesCategory = activeCategory === "Tất cả" || g.category === activeCategory;
                    return matchesSearch && matchesCategory;
                });
            }, [searchTerm, activeCategory, games]);

            if (view === "admin") {
                return (
                    <div className="flex h-screen bg-[#F1F5F9]">
                        <aside className="w-64 bg-slate-900 text-slate-400 p-6 flex flex-col">
                            <div className="flex items-center gap-3 mb-10 text-white">
                                <div className="bg-indigo-600 p-2 rounded-xl"><i data-lucide="gamepad-2"></i></div>
                                <span className="text-xl font-black uppercase tracking-tight">Admin<span className="text-indigo-500">Panel</span></span>
                            </div>
                            <nav className="flex-grow space-y-2">
                                <button onClick={() => setAdminTab('dashboard')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-sm ${adminTab === 'dashboard' ? 'bg-indigo-600 text-white shadow-lg' : 'hover:bg-slate-800'}`}><i data-lucide="layout-dashboard"></i> Tổng quan</button>
                                <button onClick={() => setAdminTab('manage')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-sm ${adminTab === 'manage' ? 'bg-indigo-600 text-white shadow-lg' : 'hover:bg-slate-800'}`}><i data-lucide="bar-chart-3"></i> Quản lý</button>
                                <button onClick={() => {setAdminTab('add'); setEditingGame(null);}} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-sm ${adminTab === 'add' ? 'bg-indigo-600 text-white shadow-lg' : 'hover:bg-slate-800'}`}><i data-lucide="plus-circle"></i> Đăng Game</button>
                            </nav>
                            <button onClick={() => setView("user")} className="mt-auto flex items-center gap-3 px-4 py-3 hover:text-red-400 font-black text-xs uppercase tracking-widest"><i data-lucide="log-out"></i> Thoát</button>
                        </aside>
                        <main className="flex-1 overflow-y-auto p-10">
                            {adminTab === 'dashboard' && (
                                <div className="animate-in fade-in slide-in-from-bottom-4 duration-500">
                                    <h2 className="text-3xl font-black text-slate-800 mb-8 tracking-tighter">THỐNG KÊ</h2>
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                        <div className="bg-white p-8 rounded-[2rem] border border-slate-100 shadow-sm flex flex-col items-center">
                                            <div className="bg-blue-50 text-blue-600 p-4 rounded-2xl mb-4"><i data-lucide="gamepad-2"></i></div>
                                            <p className="text-slate-400 text-xs font-black uppercase tracking-widest mb-1">Game</p>
                                            <h3 className="text-4xl font-black text-slate-800">{games.length}</h3>
                                        </div>
                                        <div className="bg-white p-8 rounded-[2rem] border border-slate-100 shadow-sm flex flex-col items-center">
                                            <div className="bg-indigo-50 text-indigo-600 p-4 rounded-2xl mb-4"><i data-lucide="eye"></i></div>
                                            <p className="text-slate-400 text-xs font-black uppercase tracking-widest mb-1">Xem</p>
                                            <h3 className="text-4xl font-black text-slate-800">{games.reduce((a, b) => a + (b.views || 0), 0)}</h3>
                                        </div>
                                        <div className="bg-white p-8 rounded-[2rem] border border-slate-100 shadow-sm flex flex-col items-center">
                                            <div className="bg-orange-50 text-orange-600 p-4 rounded-2xl mb-4"><i data-lucide="download"></i></div>
                                            <p className="text-slate-400 text-xs font-black uppercase tracking-widest mb-1">Tải</p>
                                            <h3 className="text-4xl font-black text-slate-800">{games.reduce((a, b) => a + (b.downloads || 0), 0)}</h3>
                                        </div>
                                    </div>
                                </div>
                            )}
                            {adminTab === 'add' && (
                                <div className="max-w-3xl mx-auto bg-white p-10 rounded-[3rem] shadow-sm border border-slate-100">
                                    <h2 className="text-2xl font-black text-slate-800 mb-8 uppercase tracking-tighter text-center">{editingGame ? 'Sửa thông tin' : 'Đăng game mới'}</h2>
                                    <form onSubmit={handleGameSubmit} className="space-y-5 text-sm">
                                        <div className="grid grid-cols-2 gap-4">
                                            <input name="title" required className="bg-slate-50 border-none rounded-xl p-4 focus:ring-2 focus:ring-indigo-500" placeholder="Tên Game" defaultValue={editingGame?.title} />
                                            <select name="category" className="bg-slate-50 border-none rounded-xl p-4 focus:ring-2 focus:ring-indigo-500" defaultValue={editingGame?.category || "Hành động"}>
                                                {CATEGORIES.filter(c => c !== "Tất cả").map(c => <option key={c} value={c}>{c}</option>)}
                                            </select>
                                        </div>
                                        <input name="image" required className="w-full bg-slate-50 border-none rounded-xl p-4 focus:ring-2 focus:ring-indigo-500" placeholder="URL Ảnh bìa" defaultValue={editingGame?.image} />
                                        <div className="grid grid-cols-2 gap-4">
                                            <input name="size" required className="bg-slate-50 border-none rounded-xl p-4 focus:ring-2 focus:ring-indigo-500" placeholder="Dung lượng (VD: 50 GB)" defaultValue={editingGame?.size} />
                                            <input name="link" required className="bg-slate-50 border-none rounded-xl p-4 focus:ring-2 focus:ring-indigo-500" placeholder="Link tải rút gọn" defaultValue={editingGame?.link} />
                                        </div>
                                        <input name="minReq" required className="w-full bg-slate-50 border-none rounded-xl p-4 focus:ring-2 focus:ring-indigo-500" placeholder="Cấu hình yêu cầu" defaultValue={editingGame?.minReq} />
                                        <textarea name="description" required className="w-full bg-slate-50 border-none rounded-xl p-4 min-h-[100px] focus:ring-2 focus:ring-indigo-500" placeholder="Mô tả game" defaultValue={editingGame?.description} />
                                        <button type="submit" className="w-full bg-indigo-600 text-white font-black py-5 rounded-[1.5rem] shadow-xl uppercase text-xs hover:bg-indigo-700 transition-colors">
                                            {loading ? "ĐANG XỬ LÝ..." : "XÁC NHẬN ĐĂNG TẢI"}
                                        </button>
                                    </form>
                                </div>
                            )}
                        </main>
                    </div>
                );
            }

            return (
                <div className="min-h-screen">
                    {/* Header */}
                    <header className="sticky top-0 z-40 bg-white/80 backdrop-blur-md border-b border-slate-200">
                        <div className="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between gap-6">
                            <div className="flex items-center gap-3">
                                <div className="bg-indigo-600 p-2 rounded-xl text-white"><i data-lucide="gamepad-2"></i></div>
                                <span className="text-2xl font-black tracking-tight text-slate-900 hidden sm:block uppercase">Game<span className="text-indigo-600">Pass</span></span>
                            </div>
                            <div className="flex-1 max-w-xl relative">
                                <i data-lucide="search" className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" style={{ width: 18, height: 18 }}></i>
                                <input 
                                    type="text" 
                                    placeholder="Tìm kiếm game đỉnh cao..." 
                                    className="w-full bg-slate-100 border-none focus:ring-2 focus:ring-indigo-500 rounded-2xl py-3 pl-12 pr-4 transition-all text-sm font-medium" 
                                    onChange={(e) => setSearchTerm(e.target.value)} 
                                />
                            </div>
                            <div className="flex items-center gap-4">
                                <button onClick={() => setModals({ ...modals, login: true })} className="bg-slate-900 text-white px-6 py-2.5 rounded-xl font-black text-[10px] uppercase tracking-wider shadow-lg">Đăng nhập</button>
                            </div>
                        </div>
                    </header>

                    {/* Main Content */}
                    <main className="max-w-7xl mx-auto px-6 py-10">
                        <div className="relative rounded-[3rem] overflow-hidden bg-slate-900 mb-16 h-80 flex items-center shadow-2xl">
                            <img src="https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=1200&auto=format&fit=crop" className="absolute inset-0 w-full h-full object-cover opacity-40" alt="Hero" />
                            <div className="relative z-10 p-10 md:p-16">
                                <Badge variant="hot">Premium Experience</Badge>
                                <h1 className="text-4xl md:text-6xl font-black text-white mt-4 mb-4 leading-none uppercase tracking-tighter">Kho Game <br/> Bản Quyền Việt</h1>
                                <p className="text-slate-300 text-lg opacity-80 font-medium">Tải nhanh, an toàn, hỗ trợ cài đặt tận tình 24/7.</p>
                            </div>
                        </div>

                        {/* Category Filter */}
                        <div className="flex gap-2 overflow-x-auto pb-6 no-scrollbar">
                            {CATEGORIES.map(cat => (
                                <button 
                                    key={cat}
                                    onClick={() => setActiveCategory(cat)}
                                    className={`px-6 py-2 rounded-full text-xs font-bold transition-all whitespace-nowrap ${activeCategory === cat ? 'bg-indigo-600 text-white shadow-lg' : 'bg-white text-slate-500 border border-slate-100 hover:bg-slate-50'}`}
                                >
                                    {cat}
                                </button>
                            ))}
                        </div>

                        {/* Loading State */}
                        {loading && !user && (
                            <div className="flex justify-center py-20">
                                <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600"></div>
                            </div>
                        )}

                        {/* Grid */}
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
                            {filteredGames.map(game => (
                                <div key={game.id} onClick={() => { setSelectedGame(game); trackInteraction(game.id, 'views'); }} className="group bg-white rounded-[2.5rem] overflow-hidden shadow-sm hover:shadow-2xl transition-all duration-300 cursor-pointer border border-slate-100 flex flex-col">
                                    <div className="relative aspect-video overflow-hidden">
                                        <img src={game.image} alt={game.title} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" />
                                        <div className="absolute top-4 left-4"><Badge variant="primary">{game.category}</Badge></div>
                                    </div>
                                    <div className="p-6">
                                        <h3 className="font-black text-slate-800 text-xl mb-2 uppercase line-clamp-1">{game.title}</h3>
                                        <div className="flex gap-4 text-slate-400 text-xs mb-4">
                                            <span className="flex items-center"><i data-lucide="eye" className="mr-1" style={{ width:14, height:14 }}></i> {(game.views || 0)}</span>
                                            <span className="flex items-center"><i data-lucide="download" className="mr-1" style={{ width:14, height:14 }}></i> {(game.downloads || 0)}</span>
                                        </div>
                                        <div className="flex justify-between items-center pt-4 border-t border-slate-50">
                                            <span className="text-[10px] font-black text-slate-700 uppercase">{game.size}</span>
                                            <div className="text-indigo-600 font-black text-xs">TẢI NGAY</div>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>

                    {/* Modals */}
                    {modals.login && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
                            <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-md" onClick={() => setModals({ ...modals, login: false })}></div>
                            <div className="relative bg-white w-full max-w-sm rounded-[2rem] p-8 shadow-2xl animate-in zoom-in-95">
                                <h2 className="text-2xl font-black text-slate-800 mb-6 text-center">Hệ thống Quản lý</h2>
                                <form onSubmit={(e) => {
                                    e.preventDefault();
                                    if(e.target.email.value === 'admin@gamepass.com' && e.target.pass.value === 'admin123') {
                                        setView("admin");
                                        setModals({ ...modals, login: false });
                                    } else { 
                                        alert("Thông tin đăng nhập sai!"); 
                                    }
                                }} className="space-y-4">
                                    <input name="email" type="email" placeholder="Email Admin" className="w-full bg-slate-50 border-none rounded-xl p-4 text-sm" />
                                    <input name="pass" type="password" placeholder="Mật khẩu" className="w-full bg-slate-50 border-none rounded-xl p-4 text-sm" />
                                    <button className="w-full bg-indigo-600 text-white font-black py-4 rounded-xl uppercase text-xs hover:bg-indigo-700 transition-colors">Đăng nhập</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {selectedGame && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
                            <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-md" onClick={() => setSelectedGame(null)}></div>
                            <div className="relative bg-white w-full max-w-2xl rounded-[2.5rem] overflow-hidden shadow-2xl max-h-[90vh] overflow-y-auto animate-in zoom-in-95">
                                <div className="h-64 relative">
                                    <img src={selectedGame.image} className="w-full h-full object-cover" />
                                    <button onClick={() => setSelectedGame(null)} className="absolute top-4 right-4 bg-black/20 hover:bg-black/40 text-white p-2 rounded-full backdrop-blur-md transition-colors">
                                        <i data-lucide="x"></i>
                                    </button>
                                </div>
                                <div className="p-8">
                                    <Badge variant="category" className="mb-2">{selectedGame.category}</Badge>
                                    <h2 className="text-4xl font-black text-slate-900 mb-4 uppercase leading-none">{selectedGame.title}</h2>
                                    <div className="bg-slate-50 p-4 rounded-xl mb-6">
                                        <p className="text-[10px] font-bold text-slate-400 uppercase mb-1">Cấu hình yêu cầu</p>
                                        <p className="text-sm text-slate-600">{selectedGame.minReq}</p>
                                    </div>
                                    <p className="text-slate-600 mb-8 leading-relaxed">{selectedGame.description}</p>
                                    <a 
                                        href={selectedGame.link} 
                                        target="_blank" 
                                        onClick={() => trackInteraction(selectedGame.id, 'downloads')}
                                        className="block w-full bg-indigo-600 text-white text-center font-black py-5 rounded-2xl uppercase text-xs shadow-lg hover:bg-indigo-700 transition-colors"
                                    >
                                        Tải Link Rút Gọn (Size: {selectedGame.size})
                                    </a>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
